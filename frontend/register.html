<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register | Fake News Detector</title>

    <link rel="stylesheet"
          href="auth.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <h1>Create Account 🚀</h1>

            <p>
                Join the AI Fake News Detection Platform
            </p>

            <form id="registerForm">

                <!-- Full Name -->

                <div class="input-group">

                    <label>Full Name</label>

                    <input
                        type="text"
                        id="name"
                        placeholder="Enter your full name"
                        required>

                </div>

                <!-- Email -->

                <div class="input-group">

                    <label>Email Address</label>

                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                        required>

                </div>

                <!-- Password -->

                <div class="input-group">

                    <label>Password</label>

                    <div class="password-container">

                        <input
                            type="password"
                            id="password"
                            placeholder="Create password"
                            required>

                        <button
                            type="button"
                            id="togglePassword">

                            👁️

                        </button>

                    </div>

                </div>

                <!-- Password Strength -->

                <div class="strength-container">

                    <div
                        id="strengthBar"
                        class="strength-bar">

                    </div>

                </div>

                <small id="strengthText">
                    Password Strength
                </small>

                <!-- Confirm Password -->

                <div class="input-group">

                    <label>Confirm Password</label>

                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm password"
                        required>

                </div>

                <!-- Terms -->

                <div class="options">

                    <label>

                        <input
                            type="checkbox"
                            id="terms"
                            required>

                        I agree to Terms &
                        Conditions

                    </label>

                </div>

                <!-- Submit -->

                <button
                    type="submit"
                    class="auth-btn">

                    Create Account

                </button>

            </form>

            <div
                id="message"
                class="message">

            </div>

            <p class="bottom-text">

                Already have an account?

                <a href="login.html">

                    Login

                </a>

            </p>

        </div>

    </div>

    <script src="auth.js"></script>

</body>

</html>
