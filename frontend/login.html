<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | Fake News Detector</title>

    <link rel="stylesheet"
          href="auth.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <h1>Welcome Back 👋</h1>

            <p>
                Login to continue analyzing news
            </p>

            <form id="loginForm">

                <div class="input-group">

                    <label>Email</label>

                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                        required>

                </div>

                <div class="input-group">

                    <label>Password</label>

                    <div class="password-container">

                        <input
                            type="password"
                            id="password"
                            placeholder="Enter password"
                            required>

                        <button
                            type="button"
                            id="togglePassword">

                            👁️

                        </button>

                    </div>

                </div>

                <div class="options">

                    <label>

                        <input
                            type="checkbox"
                            id="rememberMe">

                        Remember Me

                    </label>

                    <a href="#">
                        Forgot Password?
                    </a>

                </div>

                <button
                    type="submit"
                    class="auth-btn">

                    Login

                </button>

            </form>

            <div
                id="message"
                class="message">

            </div>

            <div class="divider">

                <span>
                    OR
                </span>

            </div>

            <button
                class="google-btn">

                Continue with Google

            </button>

            <p class="bottom-text">

                Don't have an account?

                <a href="register.html">

                    Register

                </a>

            </p>

        </div>

    </div>

    <script src="auth.js"></script>

</body>

</html>
